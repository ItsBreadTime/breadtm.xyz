name: Compress Images

on:
  workflow_dispatch:  # Allows manual triggering
  push:
    paths:
      - 'static/fullres/toys/**/*.jpg'
      - 'static/fullres/toys/**/*.jpeg'
      - 'static/fullres/toys/**/*.png'
    branches:
      - main  # Change to your default branch if different

jobs:
  compress-images:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Cache compression state
        uses: actions/cache@v4
        with:
          path: static/toys/.compression-state.json
          key: image-compression-state-${{ github.run_id }}
          restore-keys: |
            image-compression-state-
      
      - name: Check system memory
        run: free -h
      
      - name: Compress images
        run: node scripts/compress-images.js
        
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add static/toys/
          git diff --staged --quiet || git commit -m "Compress images [automated]"
          git push
